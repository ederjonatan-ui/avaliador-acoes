<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliador Ações</title>
    <style> /* Add some basic styling */ </style>
</head>
<body>
    <h1>Avaliador Ações</h1>
    <label for="time-period">Select Time Period:</label>
    <select id="time-period">
        <option value="hourly">Hourly</option>
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="annual">Annual</option>
    </select>

    <div id="quote-container">
        <p id="quote">Current Quote: <span id="current-quote">Loading...</span></p>
    </div>

    <script>
        const quoteContainer = document.getElementById('quote-container');
        const currentQuoteElement = document.getElementById('current-quote');

        async function fetchQuote() {
            try {
                // Fetch current quote from an API
                const response = await fetch('API_URL'); // Replace with actual API URL
                const data = await response.json();
                currentQuoteElement.innerText = data.quote;
            } catch (error) {
                console.error('Error fetching quote:', error);
                // Fallback to last closing price
                currentQuoteElement.innerText = 'Last Closing Price: $XYZ'; // Replace XYZ with actual last closing price
            }
        }

        fetchQuote();
    </script>
</body>
</html>
