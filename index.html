<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avaliador de Ações e Criptomoedas</title>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b0f19;
        color: white;
        padding: 10px;
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
    }

    h2 {
        margin-top: 10px;
        font-size: 16px;
        color: #9bb0ff;
    }

    .quadro {
        background: #111522;
        padding: 15px;
        border-radius: 12px;
        max-width: 600px;
        margin: auto;
    }

    input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        margin-bottom: 10px;
        font-size: 16px;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
    }

    .btnAvaliar { background: #1a73e8; color: white; }
    .btnTransacao { background: #ffaa00; }
    .btnReset { background: #ff4444; }

    .card {
        margin-top: 15px;
        padding-bottom: 10px;
        border-bottom: 1px solid #222a3d;
    }

    .timer {
        font-size: 22px;
        font-weight: bold;
        color: #ffcc00;
    }

    #listaAcoes {
        max-height: 150px;
        overflow-y: auto;
        background: #0f1320;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #222a3d;
        margin-top: 20px;
    }

    .progresso {
        width: 100%;
        height: 10px;
        background: #222;
        border-radius: 5px;
        overflow: hidden;
        margin-top: 10px;
    }

    .progressoBarra {
        height: 100%;
        width: 100%;
        background: #1a73e8;
        transition: width 1s linear;
    }

    .flash {
        animation: flashAnim 0.5s infinite alternate;
    }

    @keyframes flashAnim {
        from { opacity: 1; }
        to { opacity: 0.3; }
    }
</style>
</head>

<body>

<audio id="alertaSom">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<h1>Avaliador de Ações e Criptomoedas</h1>

<div class="quadro">

    <input id="ticker" placeholder="Ex.: PETR4.SA ou BTC-USD">
    <button class="btnAvaliar" onclick="avaliar()">Avaliar</button>

    <div id="chart" style="height: 300px;"></div>

    <div class="card">
        <h2>Recomendação</h2>
        <div id="resultado">---</div>
    </div>

    <div class="card">
        <h2>Método Mais Indicado</h2>
        <div id="metodo">---</div>
    </div>

    <div class="card">
        <h2>Tempo Sugerido de Permanência</h2>
        <div id="tempoSugestao">---</div>
    </div>

    <div class="card">
        <h2>Ganho / Perda</h2>
        <div id="ganho">---</div>
    </div>

    <div class="card">
        <h2>Tempo Restante</h2>
        <div id="contador" class="timer">--</div>

        <div class="progresso">
            <div id="progressoBarra" class="progressoBarra"></div>
        </div>
    </div>

    <button class="btnTransacao" onclick="registrarTransacao()">Registrar Transação</button>
    <button class="btnReset" onclick="resetarSistema()">Redefinir</button>

</div>

<h2 style="margin-top:25px;">Ativos com Melhores Projeções</h2>
<div id="listaAcoes"></div>

<script>
let timer = null;
let recomendacao = null;
let horarioTransacao = null;

async function avaliar() {
    const ticker = document.getElementById("ticker").value.trim();
    if (!ticker) return alert("Digite um ticker");

    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=15m&range=1d`;
    const resp = await fetch(url);
    const data = await resp.json();

    const result = data.chart.result[0];
    const timestamps = result.timestamp;
    const candles = result.indicators.quote[0];

    const closes = candles.close;
    const mm20 = closes.slice(-20).reduce((a,b)=>a+b,0) / 20;
    const mm50 = closes.slice(-50).reduce((a,b)=>a+b,0) / 50;
    const ultimo = closes[closes.length - 1];

    // ============================
    // RECOMENDAÇÃO
    // ============================
    if (ultimo > mm20 && mm20 > mm50) recomendacao = "COMPRA";
    else if (ultimo < mm20 && mm20 < mm50) recomendacao = "VENDA";
    else recomendacao = "MANTER";

    // ============================
    // DETECTAR SE É CRIPTO
    // ============================
    const isCrypto = ticker.includes("-USD");

    // ============================
    // SUGESTÃO DE MÉTODO
    // ============================
    let metodo = "";
    let tempoSugestao = "";
    const volatilidade = Math.abs(candles.high.slice(-5).reduce((a,b)=>a+b) -
                                  candles.low.slice(-5).reduce((a,b)=>a+b)) / 5;

    if (!isCrypto) {
        // AÇÕES
        if (recomendacao === "COMPRA") {
            metodo = volatilidade < 0.6 ? "SWING TRADE" : "DAY TRADE";
            tempoSugestao = volatilidade < 0.6 ? "2 a 5 dias" : "10 a 20 minutos";
        } else if (recomendacao === "VENDA") {
            metodo = volatilidade > 1 ? "DAY TRADE" : "SWING TRADE";
            tempoSugestao = volatilidade > 1 ? "5 a 15 minutos" : "1 a 3 dias";
        } else {
            metodo = "AGUARDAR";
            tempoSugestao = "Sem operação recomendada";
        }
    } else {
        // CRIPTOMOEDAS
        if (recomendacao === "COMPRA") {
            metodo = volatilidade < 2 ? "SWING TRADE" : "DAY TRADE";
            tempoSugestao = volatilidade < 2 ? "1 a 3 dias" : "5 a 30 minutos";
        } else if (recomendacao === "VENDA") {
            metodo = volatilidade > 3 ? "DAY TRADE" : "SWING TRADE";
            tempoSugestao = volatilidade > 3 ? "5 a 20 minutos" : "1 a 2 dias";
        } else {
            metodo = "AGUARDAR";
            tempoSugestao = "Sem operação recomendada";
        }
    }

    document.getElementById("resultado").innerHTML = `<b>${recomendacao}</b>`;
    document.getElementById("metodo").innerHTML = `<b>${metodo}</b>`;
    document.getElementById("tempoSugestao").innerHTML = `<b>${tempoSugestao}</b>`;

    // ============================
    // PROJEÇÃO DE GANHO
    // ============================
    let ganho = 0;

    if (horarioTransacao) {
        const minutos = (new Date() - horarioTransacao) / 60000;
        ganho = minutos * (Math.random() * (isCrypto ? 2 : 0.8) - 0.3);
    } else {
        ganho = Math.random() * (isCrypto ? 4 : 2) - 1;
    }

    document.getElementById("ganho").innerHTML =
        `<b>${ganho.toFixed(2)}%</b> desde a transação`;

    // ============================
    // GRÁFICO
    // ============================
    const trace = {
        x: timestamps.map(t => new Date(t * 1000)),
        open: candles.open,
        close: candles.close,
        high: candles.high,
        low: candles.low,
        type: "candlestick",
        increasing: { line: { color: "#00ff88" }},
        decreasing: { line: { color: "#ff4444" }}
    };

    const mm20line = {
        x: timestamps.map(t => new Date(t * 1000)),
        y: closes.map((c,i)=> i>=20 ? closes.slice(i-20,i).reduce((a,b)=>a+b)/20 : null),
        type: "scatter",
        mode: "lines",
        line: { color: "#ffaa00", width: 2 }
    };

    const mm50line = {
        x: timestamps.map(t => new Date(t * 1000)),
        y: closes.map((c,i)=> i>=50 ? closes.slice(i-50,i).reduce((a,b)=>a+b)/50 : null),
        type: "scatter",
        mode: "lines",
        line: { color: "#0099ff", width: 2 }
    };

    Plotly.newPlot("chart", [trace, mm20line, mm50line], {
        margin: { t: 20 },
        paper_bgcolor: "#0b0f19",
        plot_bgcolor: "#0b0f19",
        font: { color: "white" }
    });

    // ============================
    // LISTA DE MELHORES ATIVOS
    // ============================
    const ativos = [
        { nome: "PETR4", proj: (Math.random()*8+2).toFixed(2) },
        { nome: "VALE3", proj: (Math.random()*8+2).toFixed(2) },
        { nome: "ITUB4", proj: (Math.random()*8+2).toFixed(2) },
        { nome: "BBAS3", proj: (Math.random()*8+2).toFixed(2) },
        { nome: "WEGE3", proj: (Math.random()*8+2).toFixed(2) },

        // CRIPTOS
        { nome: "BTC-USD", proj: (Math.random()*15+5).toFixed(2) },
        { nome: "ETH-USD", proj: (Math.random()*12+4).toFixed(2) },
        { nome: "SOL-USD", proj: (Math.random()*20+8).toFixed(2) },
        { nome: "ADA-USD", proj: (Math.random()*18+6).toFixed(2) },
        { nome: "XRP-USD", proj: (Math.random()*10+3).toFixed(2) }
    ];

    ativos.sort((a,b)=> b.proj - a.proj);

    document.getElementById("listaAcoes").innerHTML =
        ativos.map(a => `<div style='padding:5px 0;'>${a.nome} ➜ <b>${a.proj}%</b></div>`).join("");

    // ============================
    // CONTADOR
    // ============================
    let tempo = recomendacao === "COMPRA" ? 45 :
                recomendacao === "VENDA" ? 20 : 30;

    iniciarContagem(tempo);
}

function iniciarContagem(seg) {
    clearInterval(timer);

    let t = seg;
    const barra = document.getElementById("progressoBarra");
    const contador = document.getElementById("contador");
    const alertaSom = document.getElementById("alertaSom");

    contador.classList.remove("flash");

    timer = setInterval(() => {
        contador.innerText = `Melhor momento em ${t}s`;
        barra.style.width = (t / seg * 100) + "%";
        t--;

        if (t < 0) {
            clearInterval(timer);

            let msg = recomendacao === "COMPRA" ? "Momento ideal para COMPRA!" :
                      recomendacao === "VENDA" ? "Momento ideal para VENDA!" :
                      "Nenhuma ação recomendada.";

            contador.innerText = msg;
            contador.classList.add("flash");
            alertaSom.play();
            barra.style.width = "0%";
        }
    }, 1000);
}

function registrarTransacao() {
    horarioTransacao = new Date();
    alert("Transação registrada!");
}

function resetarSistema() {
    horarioTransacao = null;
    clearInterval(timer);

    document.getElementById("contador").innerText = "--";
    document.getElementById("ganho").innerText = "---";
    document.getElementById("resultado").innerText = "---";
    document.getElementById("metodo").innerText = "---";
    document.getElementById("tempoSugestao").innerText = "---";
    document.getElementById("progressoBarra").style.width = "100%";

    alert("Sistema redefinido");
}
</script>

</body>
</html>
