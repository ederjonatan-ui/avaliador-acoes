.container {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.quadro {
    flex: 1;
    min-width: 320px;
    max-width: 600px;
    background: #111522;
    padding: 10px;
    border-radius: 12px;
}

/* MOBILE: quadros empilhados */
@media (max-width: 768px) {
    .container {
        flex-direction: column;
    }
}
