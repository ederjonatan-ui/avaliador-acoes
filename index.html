<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliador de Ações – IA Híbrida</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px #0002;
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            font-size: 16px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 6px;
        }

        button:hover {
            background: #005fcc;
        }

        #resultado {
            margin-top: 20px;
            padding: 15px;
            background: #fafafa;
            border-radius: 8px;
            min-height: 50px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Avaliador de Ações – IA Híbrida</h2>

    <!-- CAMPO DO ATIVO -->
    <input id="ativo" type="text" placeholder="Ex: VALE3">

    <!-- INTERVALO -->
    <select id="intervalo">
        <option value="1h">1 hora</option>
        <option value="1d">Diário</option>
        <option value="1wk">Semanal</option>
    </select>

    <!-- BOTÃO -->
    <button onclick="avaliar()">Avaliar Ativo</button>

    <!-- RESULTADO -->
    <div id="resultado">Resultado aparecerá aqui...</div>
</div>

<!-- APP.JS COM VERSIONAMENTO -->
<script src="app.js?v=60000">
