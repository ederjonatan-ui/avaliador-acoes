<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avaliador de Ações – IA Híbrida</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>Avaliador de Ações – IA Híbrida</header>

<div class="container">

    <input id="ticker" placeholder="Digite o ativo (ex: PETR4, VALE3, AAPL)" autocomplete="off">

    <select id="intervalo">
        <option value="1d">Diário</option>
        <option value="1h">1 hora</option>
        <option value="15m">15 minutos</option>
    </select>

    <button onclick="avaliar()">Avaliar Ativo</button>

    <div id="resultado">Resultado aparecerá aqui...</div>

    <div class="cards" id="cardsPainel" style="display:none;">
        <div class="card"><h3>Recomendação</h3><div id="cardRecomendacao" class="valor"></div></div>
        <div class="card"><h3>Preço ideal de compra</h3><div id="cardCompra" class="valor verde"></div></div>
        <div class="card"><h3>Preço ideal de venda</h3><div id="cardVenda" class="valor vermelho"></div></div>
        <div class="card"><h3>Preço alvo</h3><div id="cardAlvo" class="valor amarelo"></div></div>
        <div class="card"><h3>Stop sugerido</h3><div id="cardStop" class="valor vermelho"></div></div>
        <div class="card"><h3>Probabilidade final</h3><div id="cardProb" class="valor"></div></div>
        <div class="card"><h3>Risco</h3><div id="cardRisco" class="valor"></div></div>
        <div class="card"><h3>Resumo técnico</h3><div id="cardResumo" style="white-space:pre-line;"></div></div>
    </div>

    <canvas id="grafico" height="200"></canvas>

</div>

<script src="app.js"></script>

</body>
</html>
