<!DOCTYPE html>
<html lang="pt-BR">
<head>

<title>Avaliador de Ações com IA Híbrida</title>

<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;

        color: #000000;
        padding: 10px;

    h1 {

    }

    .quadro {
        background: #ffffff;
        padding: 15px;
        border-radius: 12px;
        max-width: 800px;
        margin: auto;
        position: relative;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);

    label {
        font-size: 12px;

        display: block;
        margin-bottom: 2px;

    input {

        border-radius: 8px;

        overflow-y: auto;

        z-index: 10;

        gap: 6px;

        flex: 1;

        background: #e0e0e0;
        color: #000;

    }

        color: #fff;
    }

</head>

<body>

        <button class="btnIntervalo" data-int="1mo">Mensal</button>
    </div>

    <button class="btnAvaliar" onclick="avaliar()">Avaliar</button>

    <div id="chart" style="height: 320px; margin-top: 10px;"></div>

    <div class="card">
        <h2>Recomendação Final (IA Híbrida)</h2>

    </div>

    <div class="card">
        <h2>Ganho / Perda</h2>

    </div>

        <h2>Margem de Acerto</h2>
        <div id="acuracia">---</div>
    </div>

    <div class="card">
        <h2>Tempo Restante</h2>
        <div id="contador" class="timer">--</div>

        <div class="progresso">
            <div id="progressoBarra" class="progressoBarra"></div>
        </div>
    </div>

    <button class="btnTransacao" onclick="registrarTransacao()">Registrar Transação</button>
    <button class="btnReset" onclick="resetarSistema()">Redefinir</button>

</div>

    <script>
let timer = null;
let recomendacaoTecnica = null;
let intervaloAtual = "1d";

const inputTicker = document.getElementById("ticker");
const boxSugestoes = document.getElementById("sugestoes");
const botoesIntervalo = document.querySelectorAll(".btnIntervalo");

inputTicker.addEventListener("input", buscarSugestoes);

botoesIntervalo.forEach(btn => {
    btn.addEventListener("click", () => {
        botoesIntervalo.forEach(b => b.classList.remove("ativo"));
        btn.classList.add("ativo");
        intervaloAtual = btn.getAttribute("data-int");
        if (inputTicker.value.trim()) {
            avaliar();
        }
    });
});

// AUTOCOMPLETE GLOBAL
async function buscarSugestoes() {
    const texto = inputTicker.value.trim();

    if (texto.length < 2) {
        boxSugestoes.style.display = "none";
        return;
    }

    const url = `https://corsproxy.io/?https://query2.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(texto)}`;

    try {
        const resp = await fetch(url);
        const data = await resp.json();

        const lista = data.quotes || [];

        boxSugestoes.innerHTML = "";

        lista.slice(0, 12).forEach(item => {
            const nome = item.shortname || item.longname || item.symbol;
            const ticker = item.symbol;

            const div = document.createElement("div");
            div.className = "sugestao-item";
            div.innerText = `${nome} (${ticker})`;

            div.onclick = () => {
                inputTicker.value = ticker;
                boxSugestoes.style.display = "none";
            };

            boxSugestoes.appendChild(div);
        });

        boxSugestoes.style.display = lista.length ? "block" : "none";

    } catch (e) {
        console.log("Erro ao buscar sugestões:", e);
    }
}

function getRangeByInterval() {
    const now = Math.floor(Date.now() / 1000);
    let inicio;

    if (intervaloAtual === "1d") {
        inicio = now - 7 * 24 * 60 * 60;
    } else if (intervaloAtual === "1h") {
        inicio = now - 7 * 24 * 60 * 60;
    } else if (intervaloAtual === "15m") {
        inicio = now - 3 * 24 * 60 * 60;
    } else if (intervaloAtual === "1mo") {
        inicio = now - 365 * 24 * 60 * 60;
    } else {
        inicio = now - 7 * 24 * 60 * 60;
    }

    return { period1: inicio, period2: now };
}

/* =========================
   IA LOCAL (TensorFlow.js)
   ========================= */

let modeloIA = tf.sequential();
modeloIA.add(tf.layers.dense({ units: 16, activation: "relu", inputShape: [5] }));
modeloIA.add(tf.layers.dense({ units: 8, activation: "relu" }));
modeloIA.add(tf.layers.dense({ units: 1, activation: "sigmoid" }));
modeloIA.compile({ optimizer: "adam", loss: "binaryCrossentropy" });

// Stub simples (sem treino real ainda)
function previsaoLocal(mm20, mm50, rsi, macd, volatilidade) {
    const input = tf.tensor2d([[mm20, mm50, rsi, macd, volatilidade]]);
    const prob = modeloIA.predict(input).dataSync()[0];
    return prob; // 0 → baixa, 1 → alta
}

Responda em português, em formato de texto simples, pronto para exibição em HTML.
                    `
                }]
            })
        });

        const json = await resposta.json();
        if (!json.choices || !json.choices[0]) {
            return "Não foi possível obter análise da IA externa.";

        return json.choices[0].message.content;
    } catch (e) {
        console.error("Erro na IA externa:", e);
        return "Erro ao consultar a IA externa.";
    }
}

/* =========================
   MOTOR DE DECISÃO FINAL
   ========================= */

async function motorDeDecisao(dados) {
    const probLocal = previsaoLocal(dados.mm20, dados.mm50, dados.rsi, dados.macd, dados.volatilidade);
    dados.probLocal = probLocal;

    const analiseExterna = await analiseIAExterna(dados);

    document.getElementById("resultado").innerHTML = analiseExterna;
}
