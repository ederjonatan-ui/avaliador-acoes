<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avaliador de Ações com IA Híbrida</title>

<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>

<style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; color: #000; padding: 10px; }
    h1 { text-align: center; }
    .quadro { background: #fff; padding: 15px; border-radius: 12px; max-width: 800px; margin: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card { margin-top: 15px; padding-bottom: 10px; border-bottom: 1px solid #ddd; }
    .btnAvaliar { width: 100%; background: #1a73e8; color: #fff; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>

<h1>Avaliador de Ações com IA Híbrida</h1>

<div class="quadro">
    <label for="ticker">Ticker</label>
    <input id="ticker" placeholder="Ex.: PETR4.SA ou BTC-USD">
    <button class="btnAvaliar" onclick="avaliar()">Avaliar</button>

    <div id="chart" style="height: 320px; margin-top: 10px;"></div>

    <div class="card"><h2>Recomendação Final</h2><div id="resultado">---</div></div>
    <div class="card"><h2>Margem de Acerto</h2><div id="acuracia">---</div></div>
</div>

<script>
let modeloIA = tf.sequential();
modeloIA.add(tf.layers.dense({ units: 16, activation: "relu", inputShape: [5] }));
modeloIA.add(tf.layers.dense({ units: 8, activation: "relu" }));
modeloIA.add(tf.layers.dense({ units: 1, activation: "sigmoid" }));
modeloIA.compile({ optimizer: "adam", loss: "binaryCrossentropy" });

// IA local: previsão rápida
function previsaoLocal(mm20, mm50, rsi, macd, volatilidade) {
    const input = tf.tensor2d([[mm20, mm50, rsi, macd, volatilidade]]);
    return modeloIA.predict(input).dataSync()[0];
}

// IA externa: DeepSeek
async function analiseIAExterna(dados) {
    const resposta = await fetch("https://api.deepseek.com/v1/chat/completions", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer sk-678053a007514f719f527ae806ac08ae" // SUA CHAVE
        },
        body: JSON.stringify({
            model: "deepseek-chat",
            messages: [{
                role: "user",
                content: `
                Dados:
                Último preço: ${dados.ultimoPreco}
                MM20: ${dados.mm20}
                MM50: ${dados.mm50}
                RSI: ${dados.rsi}
                MACD: ${dados.macd}
                Volatilidade: ${dados.volatilidade}
                Probabilidade IA local: ${dados.probLocal}
                Taxa de acerto histórica: ${dados.taxaAcerto}%

                Gere:
                - COMPRA, VENDA ou MANTER
                - Preço ideal
                - Preço alvo
                - Probabilidade final
                - Risco
                - Justificativa
                `
            }]
        })
    });
    const json = await resposta.json();
    return json.choices[0].message.content;
}

// Motor de decisão final
async function motorDeDecisao(dados) {
    const probLocal = previsaoLocal(dados.mm20, dados.mm50, dados.rsi, dados.macd, dados.volatilidade);
    dados.probLocal = probLocal;
    const analiseExterna = await analiseIAExterna(dados);
    document.getElementById("resultado").innerHTML = analiseExterna;
}

// Função principal
async function avaliar() {
    const ticker = document.getElementById("ticker").value.trim();
    if (!ticker) { alert("Digite um ticker."); return; }

    const now = Math.floor(Date.now() / 1000);
    const weekAgo = now - 7*24*60*60;
    const url = `https://corsproxy.io/?https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?period1=${weekAgo}&period2=${now}&interval=1d`;

    const resp = await fetch(url);
    const data = await resp.json();
    if (!data.chart || data.chart.error) { alert("Erro ao obter dados."); return; }

    const result = data.chart.result[0];
    const timestamps = result.timestamp;
    const candles = result.indicators.quote[0];
    const closes = candles.close;

    const mm20 = closes.slice(-20).reduce((a,b)=>a+b,0)/Math.min(20,closes.length);
    const mm50 = closes.slice(-50).reduce((a,b)=>a+b,0)/Math.min(50,closes.length);
    const ultimoPreco = closes[closes.length-1];

    // margem de acerto simples
    let acertos=0, erros=0;
    for (let i=0;i<closes.length-1;i++){
        const atual=closes[i], prox=closes[i+1];
        const mm20_i=closes.slice(Math.max(0,i-19),i+1).reduce((a,b)=>a+b,0)/Math.min(20,i+1);
        const mm50_i=closes.slice(Math.max(0,i-49),i+1).reduce((a,b)=>a+b,0)/Math.min(50,i+1);
        let rec="MANTER";
        if(atual>mm20_i && mm20_i>mm50_i) rec="COMPRA";
        else if(atual<mm20_i && mm20_i<mm50_i) rec="VENDA";
        if(rec==="COMPRA" && prox>atual) acertos++; else if(rec==="COMPRA") erros++;
        if(rec==="VENDA" && prox<atual) acertos++; else if(rec==="VENDA") erros++;
    }
    const taxaAcerto = (acertos+erros)>0 ? (acertos/(acertos+erros)*100).toFixed(2) : "0.00";
    document.getElementById("acuracia").innerHTML = `<b>${taxaAcerto}%</b> de acerto histórico`;

    // gráfico candles + linha
    const xVals = timestamps.map(t=>new Date(t*1000));
    const candleTrace = { x:xVals, open:candles.open, close:candles.close, high:candles.high, low:candles.low, type:"candlestick", name:"Candles" };
    const lineTrace = { x:xVals, y:closes, type:"scatter", mode:"lines", line:{color:"#2962ff",width:2}, name:"Linha" };
    Plotly.newPlot("chart",[candleTrace,lineTrace],{paper_bgcolor:"#fff",plot_bgcolor:"#fff",font:{color:"#000"},xaxis:{gridcolor:"#ccc"},yaxis:{gridcolor:"#ccc"}});

    // chamar motor de decisão
    const dados = { ultimoPreco, mm20, mm50, rsi:50, macd:0, volatilidade:0.1, taxaAcerto };
    motorDeDecisao(dados);
}
</script>
</body>
</html>
