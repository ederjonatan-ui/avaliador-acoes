<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avaliador de Ações com IA Híbrida</title>

<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b0f19;
        color: #000000;
        padding: 10px;
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
        color: #ffffff;
    }

    h2 {
        margin-top: 10px;
        font-size: 16px;
        color: #1a237e;
    }

    .quadro {
        background: #ffffff;
        padding: 15px;
        border-radius: 12px;
        max-width: 800px;
        margin: auto;
        position: relative;
        box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    label {
        font-size: 12px;
        color: #555;
        display: block;
        margin-bottom: 2px;
    }

    input {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        margin-bottom: 8px;
        font-size: 14px;
    }

    .sugestoes {
        background: #ffffff;
        border: 1px solid #ccc;
        border-radius: 8px;
        max-height: 180px;
        overflow-y: auto;
        display: none;
        position: absolute;
        width: calc(100% - 40px);
        z-index: 10;
    }

    .sugestao-item {
        padding: 10px;
        cursor: pointer;
        font-size: 13px;
    }

    .sugestao-item:hover {
        background: #e3f2fd;
    }

    button {
        padding: 10px 12px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 8px;
    }

    .btnAvaliar { width: 100%; background: #1a73e8; color: white; }

    .btnTransacao { width: 100%; background: #ffb300; color: #000; }
    .btnReset { width: 100%; background: #e53935; color: white; }

    .card {
        margin-top: 15px;
        padding-bottom: 10px;
        border-bottom: 1px solid #ddd;
    }

    .timer {
        font-size: 22px;
        font-weight: bold;
        color: #f57c00;
    }

    .progresso {
        width: 100%;
        height: 10px;
        background: #eee;
        border-radius: 5px;
        overflow: hidden;
        margin-top: 10px;
    }

    .progressoBarra {
        height: 100%;
        width: 100%;
        background: #1a73e8;
        transition: width 1s linear;
    }

    .flash {
        animation: flashAnim 0.5s infinite alternate;
    }

    @keyframes flashAnim {
        from { opacity: 1; }
        to { opacity: 0.3; }
    }

    .intervalos-container {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin: 8px 0 4px 0;
    }

    .btnIntervalo {
        flex: 1;
        min-width: 80px;
        background: #e0e0e0;
        color: #000;
        text-align: center;
    }

    .btnIntervalo.ativo {
        background: #1a73e8;
        color: #fff;
    }
</style>
</head>

<body>

    align-items: center;
    z-index: 9999;
">

    <input id="senhaInput" type="password" placeholder="Senha"
