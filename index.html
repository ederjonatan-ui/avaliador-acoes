<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avaliador de Ações e Criptomoedas</title>

<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b0f19;
        color: white;
        padding: 10px;
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
    }

    h2 {
        margin-top: 10px;
        font-size: 16px;
        color: #9bb0ff;
    }

    .quadro {
        background: #111522;
        padding: 15px;
        border-radius: 12px;
        max-width: 600px;
        margin: auto;
        position: relative;
    }

    input {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: none;
        margin-bottom: 8px;
        font-size: 14px;
    }

    .sugestoes {
        background: #1a1f2e;
        border: 1px solid #2a3145;
        border-radius: 8px;
        max-height: 180px;
        overflow-y: auto;
        display: none;
        position: absolute;
        width: calc(100% - 40px);
        z-index: 10;
    }

    .sugestao-item {
        padding: 10px;
        cursor: pointer;
    }

    .sugestao-item:hover {
        background: #2a3145;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
    }

    .btnAvaliar { background: #1a73e8; color: white; }
    .btnTransacao { background: #ffaa00; }
    .btnReset { background: #ff4444; }

    .card {
        margin-top: 15px;
        padding-bottom: 10px;
        border-bottom: 1px solid #222a3d;
    }

    .timer {
        font-size: 22px;
        font-weight: bold;
        color: #ffcc00;
    }

    .progresso {
        width: 100%;
        height: 10px;
        background: #222;
        border-radius: 5px;
        overflow: hidden;
        margin-top: 10px;
    }

    .progressoBarra {
        height: 100%;
        width: 100%;
        background: #1a73e8;
        transition: width 1s linear;
    }

    .flash {
        animation: flashAnim 0.5s infinite alternate;
    }

    @keyframes flashAnim {
        from { opacity: 1; }
        to { opacity: 0.3; }
    }
</style>
</head>

<body>

<audio id="alertaSom">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<h1>Avaliador de Ações e Criptomoedas</h1>

<div class="quadro">

    <label for="ticker">Ticker</label>
    <input id="ticker" placeholder="Ex.: PETR4.SA ou BTC-USD">

    <div id="sugestoes" class="sugestoes"></div>

    <button class="btnAvaliar" onclick="avaliar()">Avaliar</button>

    <div id="chart" style="height: 300px;"></div>

    <div class="card">
        <h2>Recomendação</h2>
        <div id="resultado">---</div>
    </div>

    <div class="card">
        <h2>Método Mais Indicado</h2>
        <div id="metodo">---</div>
    </div>

    <div class="card">
        <h2>Tempo Sugerido de Permanência</h2>
        <div id="tempoSugestao">---</div>
    </div>

    <div class="card">
        <h2>Ganho / Perda</h2>
        <div id="ganho">---</div>
    </div>

    <div class="card">
        <h2>Tempo Restante</h2>
        <div id="contador" class="timer">--</div>

        <div class="progresso">
            <div id="progressoBarra" class="progressoBarra"></div>
        </div>
    </div>

    <button class="btnTransacao" onclick="registrarTransacao()">Registrar Transação</button>
    <button class="btnReset" onclick="resetarSistema()">Redefinir</button>

</div>

<script>
let timer = null;
let recomendacao = null;

const inputTicker = document.getElementById("ticker");
const boxSugestoes = document.getElementById("sugestoes");

inputTicker.addEventListener("input", buscarSugestoes);

// AUTOCOMPLETE GLOBAL
async function buscarSugestoes() {
    const texto = inputTicker.value.trim();

    if (texto.length < 2) {
        boxSugestoes.style.display = "none";
        return;
    }

    const url = `https://corsproxy.io/?https://query2.finance.yahoo.com/v1/finance/search?q=${texto}`;

    try {
        const resp = await fetch(url);
        const data = await resp.json();

        const lista = data.quotes || [];

        boxSugestoes.innerHTML = "";

        lista.slice(0, 12).forEach(item => {
            const nome = item.shortname || item.longname || item.symbol;
            const ticker = item.symbol;

            const div = document.createElement("div");
            div.className = "sugestao-item";
            div.innerText = `${nome} (${ticker})`;

            div.onclick = () => {
                inputTicker.value = ticker;
                boxSugestoes.style.display = "none";
            };

            boxSugestoes.appendChild(div);
        });

        boxSugestoes.style.display = lista.length ? "block" : "none";

    } catch (e) {
        console.log("Erro ao buscar sugestões:", e);
    }
}

function getLastWeekRange() {
    const now = Math.floor(Date.now() / 1000);
    const weekAgo = now - (7 * 24 * 60 * 60);
    return { period1: weekAgo, period2: now };
}

async function avaliar() {
    const ticker = inputTicker.value.trim();

    if (!ticker) {
        alert("Digite um ticker antes de avaliar.");
        return;
    }

    const range = getLastWeekRange();
    const period1 = range.period1;
    const period2 = range.period2;

    const url = `https://corsproxy.io/?https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?period1=${period1}&period2=${period2}&interval=1d`;

    const resp = await fetch(url);
    const data = await resp.json();

    if (!data.chart || data.chart.error) {
        alert("Não foi possível obter dados para esse ticker.");
        return;
    }

    const result = data.chart.result[0];
    const timestamps = result.timestamp;
    const candles = result.indicators.quote[0];
    const closes = candles.close;

    if (!closes || closes.length < 2) {
        alert("Poucos dados disponíveis.");
        return;
    }

    const primeiro = closes[0];
    const ultimo = closes[closes.length - 1];
    const desempenhoSemana = ((ultimo - primeiro) / primeiro) * 100;

    document.getElementById("ganho").innerHTML =
        `<b>${desempenhoSemana.toFixed(2)}%</b> na última semana`;

    const mm20 = closes.slice(-20).reduce((a,b)=>a+b,0) / 20;
    const mm50 = closes.slice(-50).reduce((a,b)=>a+b,0) / 50;

    const ultimoPreco = closes[closes.length - 1];

    if (ultimoPreco > mm20 && mm20 > mm50) recomendacao = "COMPRA";
    else if (ultimoPreco < mm20 && mm20 < mm50) recomendacao = "VENDA";
    else recomendacao = "MANTER";

    // PREÇO IDEAL
    let precoIdeal = mm20.toFixed(2);
    let textoRecomendacao = "";

    if (recomendacao === "COMPRA") {
        textoRecomendacao =
            `<b>COMPRA</b> — Preço ideal: <span style="color:#00ff88">R$ ${precoIdeal}</span>`;
    }
    else if (recomendacao === "VENDA") {
        textoRecomendacao =
            `<b>VENDA</b> — Preço ideal: <span style="color:#ff4444">R$ ${precoIdeal}</span>`;
    }
    else {
        textoRecomendacao =
            `<b>MANTER</b> — Preço ideal: ---`;
    }

    document.getElementById("resultado").innerHTML = textoRecomendacao;

    // TEMPO INTELIGENTE
    let tempoRecomendado = 30;
    if (recomendacao === "COMPRA") tempoRecomendado = 45;
    if (recomendacao === "VENDA") tempoRecomendado = 20;

    // GRÁFICO
    const trace = {
        x: timestamps.map(t => new Date(t * 1000)),
        open: candles.open,
        close: candles.close,
        high: candles.high,
        low: candles.low,
        type: "candlestick",
        increasing: { line: { color: "#00ff88" }},
        decreasing: { line: { color: "#ff4444" }}
    };

    Plotly.newPlot("chart", [trace], {
        margin: { t: 20 },
        paper_bgcolor: "#0b0f19",
        plot_bgcolor: "#0b0f19",
        font: { color: "white" }
    });

    iniciarContagem(tempoRecomendado);
}

function iniciarContagem(seg) {
    clearInterval(timer);

    let t = seg;
    const barra = document.getElementById("progressoBarra");
    const contador = document.getElementById("contador");
    const alertaSom = document.getElementById("alertaSom");

    contador.classList.remove("flash");

    timer = setInterval(() => {
        contador.innerText = `Melhor momento em ${t}s`;
        barra.style.width = (t / seg * 100) + "%";
        t--;

        if (t < 0) {
            clearInterval(timer);

            let msg = recomendacao === "COMPRA" ? "Momento ideal para COMPRA!" :
                      recomendacao === "VENDA" ? "Momento ideal para VENDA!" :
                      "Nenhuma ação recomendada.";

            contador.innerText = msg;
            contador.classList.add("flash");
            alertaSom.play();
            barra.style.width = "0%";
        }
    }, 1000);
}

function registrarTransacao() {
    alert("Transação registrada!");
}

function resetarSistema() {
    clearInterval(timer);

    document.getElementById("contador").innerText = "--";
    document.getElementById("ganho").innerText = "---";
    document.getElementById("resultado").innerText = "---";
    document.getElementById("metodo").innerText = "---";
    document.getElementById("tempoSugestao").innerText = "---";
    document.getElementById("progressoBarra").style.width = "100%";
    alert("Sistema redefinido");
}
</script>

</body>
</html>
