<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avaliador de Ações e Criptomoedas</title>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b0f19;
        color: white;
        padding: 10px;
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
    }

    h2 {
        margin-top: 10px;
        font-size: 16px;
        color: #9bb0ff;
    }

    .quadro {
        background: #111522;
        padding: 15px;
        border-radius: 12px;
        max-width: 600px;
        margin: auto;
    }

    input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        margin-bottom: 10px;
        font-size: 16px;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
    }

    .btnAvaliar { background: #1a73e8; color: white; }
    .btnTransacao { background: #ffaa00; }
    .btnReset { background: #ff4444; }

    .card {
        margin-top: 15px;
        padding-bottom: 10px;
        border-bottom: 1px solid #222a3d;
    }

    .timer {
        font-size: 22px;
        font-weight: bold;
        color: #ffcc00;
    }

    #listaAcoes {
        max-height: 150px;
        overflow-y: auto;
        background: #0f1320;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #222a3d;
        margin-top: 20px;
    }

    .progresso {
        width: 100%;
        height: 10px;
        background: #222;
        border-radius: 5px;
        overflow: hidden;
        margin-top: 10px;
    }

    .progressoBarra {
        height: 100%;
        width: 100%;
        background: #1a73e8;
        transition: width 1s linear;
    }

    .flash {
        animation: flashAnim 0.5s infinite alternate;
    }

    @keyframes flashAnim {
        from { opacity: 1; }
        to { opacity: 0.3; }
    }
</style>
</head>

<body>

<audio id="alertaSom">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<h1>Avaliador de Ações e Criptomoedas</h1>

<div class="quadro">

    <input id="ticker" placeholder="Ex.: PETR4.SA ou BTC-USD">
    <button class="btnAvaliar" onclick="avaliar()">Avaliar</button>
