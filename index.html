<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avaliador de Ações – IA Híbrida</title>

<!-- Estilo TradingView -->
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0d1117;
        color: #e6edf3;
    }

    header {
        padding: 20px;
        background: #161b22;
        text-align: center;
        font-size: 22px;
        font-weight: bold;
        border-bottom: 1px solid #30363d;
    }

    .container {
        padding: 20px;
        max-width: 900px;
        margin: auto;
    }

    input, select, button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border-radius: 6px;
        border: 1px solid #30363d;
        background: #0d1117;
        color: #e6edf3;
        font-size: 16px;
    }

    button {
        background: #238636;
        cursor: pointer;
        font-weight: bold;
    }

    button:hover {
        background: #2ea043;
    }

    #resultado {
        margin-top: 20px;
        padding: 20px;
        background: #161b22;
        border-radius: 8px;
        border: 1px solid #30363d;
        white-space: pre-line;
        font-size: 16px;
    }

    canvas {
        margin-top: 30px;
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 8px;
    }

    /* Cards estilo TradingView */
    .cards {
        margin-top: 25px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        gap: 15px;
    }

    .card {
        background: #161b22;
        border: 1px solid #30363d;
        padding: 18px;
        border-radius: 10px;
        text-align: left;
    }

    .card h3 {
        margin: 0 0 10px 0;
        font-size: 18px;
    }

    .valor {
        font-size: 22px;
        font-weight: bold;
    }

    .verde { color: #2ea043; }
    .vermelho { color: #f85149; }
    .amarelo { color: #d29922; }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<header>Avaliador de Ações – IA Híbrida</header>

<div class="container">

    <input id="ticker" placeholder="Digite o ativo (ex: PETR4, VALE3, AAPL)" autocomplete="off">

    <select id="intervalo">
        <option value="1d">Diário</option>
        <option value="1h">1 hora</option>
        <option value="15m">15 minutos</option>
    </select>

    <button onclick="avaliar()">Avaliar Ativo</button>

    <div id="resultado">Resultado aparecerá aqui...</div>

    <!-- Painel de Cards -->
    <div class="cards" id="cardsPainel" style="display:none;">
        <div class="card">
            <h3>Recomendação</h3>
            <div id="cardRecomendacao" class="valor"></div>
        </div>

        <div class="card">
            <h3>Preço ideal de compra</h3>
            <div id="cardCompra" class="valor verde"></div>
        </div>

        <div class="card">
            <h3>Preço ideal de venda</h3>
            <div id="cardVenda" class="valor vermelho"></div>
        </div>

        <div class="card">
            <h3>Preço alvo</h3>
            <div id="cardAlvo" class="valor amarelo"></div>
        </div>

        <div class="card">
            <h3>Stop sugerido</h3>
            <div id="cardStop" class="valor vermelho"></div>
        </div>

        <div class="card">
            <h3>Probabilidade final</h3>
            <div id="cardProb" class="valor"></div>
        </div>

        <div class="card">
            <h3>Risco</h3>
            <div id="cardRisco" class="valor"></div>
        </div>

        <div class="card">
            <h3>Resumo técnico</h3>
            <div id="cardResumo" style="white-space:pre-line;"></div>
        </div>
    </div>

    <canvas id="grafico" height="200"></canvas>

</div>
