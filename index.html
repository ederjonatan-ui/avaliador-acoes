<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avaliador de Ações e Criptomoedas</title>

<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        color: #000000;
        padding: 10px;
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
    }

    h2 {
        margin-top: 10px;
        font-size: 16px;
        color: #1a237e;
    }

    .quadro {
        background: #ffffff;
        padding: 15px;
        border-radius: 12px;
        max-width: 600px;
        margin: auto;
        position: relative;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    label {
        font-size: 12px;
        color: #555;
        display: block;
        margin-bottom: 2px;
    }

    input {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        margin-bottom: 8px;
        font-size: 14px;
    }

    .sugestoes {
        background: #ffffff;
        border: 1px solid #ccc;
        border-radius: 8px;
        max-height: 180px;
        overflow-y: auto;
        display: none;
        position: absolute;
        width: calc(100% - 40px);
        z-index: 10;
    }

    .sugestao-item {
        padding: 10px;
        cursor: pointer;
        font-size: 13px;
    }

    .sugestao-item:hover {
        background: #e3f2fd;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
    }

    .btnAvaliar { background: #1a73e8; color: white; }
    .btnTransacao { background: #ffb300; color: #000; }
    .btnReset { background: #e53935; color: white; }

    .card {
        margin-top: 15px;
        padding-bottom: 10px;
        border-bottom: 1px solid #ddd;
    }

    .timer {
        font-size: 22px;
        font-weight: bold;
        color: #f57c00;
    }

    .progresso {
        width: 100%;
        height: 10px;
        background: #eee;
        border-radius: 5px;
        overflow: hidden;
        margin-top: 10px;
    }

    .progressoBarra {
        height: 100%;
        width: 100%;
        background: #1a73e8;
        transition: width 1s linear;
    }

    .flash {
        animation: flashAnim 0.5s infinite alternate;
    }

    @keyframes flashAnim {
        from { opacity: 1; }
        to { opacity: 0.3; }
    }
</style>
</head>

<body>

<audio id="alertaSom">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<h1>Avaliador de Ações e Criptomoedas</h1>

<div class="quadro">

    <label for="ticker">Ticker</label>
    <input id="ticker" placeholder="Ex.: PETR4.SA ou BTC-USD">
    <div id="sugestoes" class="sugestoes"></div>

    <button class="btnAvaliar" onclick="avaliar()">Avaliar</button>

    <div id="chart" style="height: 300px; margin-top: 10px;"></div>

    <div class="card">
        <h2>Recomendação</h2>
        <div id="resultado">---</div>
    </div>

    <div class="card">
        <h2>Método Mais Indicado</h2>
        <div id="metodo">---</div>
    </div>

    <div class="card">
        <h2>Tempo Sugerido de Permanência</h2>
        <div id="tempoSugestao">---</div>
    </div>

    <div class="card">
        <h2>Ganho / Perda</h2>
        <div id="ganho">---</div>
    </div>

    <div class="card">
        <h2>Margem de Acerto</h2>
        <div id="acuracia">---</div>
    </div>

    <div class="card">
        <h2>Tempo Restante</h2>
        <div id="contador" class="timer">--</div>

        <div class="progresso">
            <div id="progressoBarra" class="progressoBarra"></div>
        </div>
    </div>

    <button class="btnTransacao" onclick="registrarTransacao()">Registrar Transação</button>
    <button class="btnReset" onclick="resetarSistema()">Redefinir</button>

</div>

<script>
let timer = null;
let recomendacao = null;

const inputTicker = document.getElementById("ticker");
const boxSugestoes = document.getElementById("sugestoes");

inputTicker.addEventListener("input", buscarSugestoes);

// AUTOCOMPLETE GLOBAL (Yahoo Finance Search + proxy)
async function buscarSugestoes() {
    const texto = inputTicker.value.trim();

    if (texto.length < 2) {
        boxSugestoes.style.display = "none";
        return;
    }

    const url = `https://corsproxy.io/?https://query2.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(texto)}`;

    try {
        const resp = await fetch(url);
        const data = await resp.json();

        const lista = data.quotes || [];

        boxSugestoes.innerHTML = "";

        lista.slice(0, 12).forEach(item => {
            const nome = item.shortname || item.longname || item.symbol;
            const ticker = item.symbol;

            const div = document.createElement("div");
            div.className = "sugestao-item";
            div.innerText = `${nome} (${ticker})`;

            div.onclick = () => {
                inputTicker.value = ticker;
                boxSugestoes.style.display = "none";
            };

            boxSugestoes.appendChild(div);
        });

        boxSugestoes.style.display = lista.length ? "block" : "none";

    } catch (e) {
        console.log("Erro ao buscar sugestões:", e);
    }
}

function getLastWeekRange() {
    const now = Math.floor(Date.now() / 1000);
    const weekAgo = now - (7 * 24 * 60 * 60);
    return { period1: weekAgo, period2: now };
}

async function avaliar() {
    const ticker = inputTicker.value.trim();

    if (!ticker) {
        alert("Digite um ticker antes de avaliar.");
        return;
    }

    const range = getLastWeekRange();
    const period1 = range.period1;
    const period2 = range.period2;

    const url = `https://corsproxy.io/?https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?period1=${period1}&period2=${period2}&interval=1d`;

    const resp = await fetch(url);
    const data = await resp.json();

    if (!data.chart || data.chart.error) {
        alert("Não foi possível obter dados para esse ticker.");
        return;
    }

    const result = data.chart.result[0];
    const timestamps = result.timestamp;
    const candles = result.indicators.quote[0];
    const closes = candles.close;

    if (!closes || closes.length < 2) {
        alert("Poucos dados disponíveis.");
        return;
    }

    // Ganho/perda na semana
    const primeiro = closes[0];
    const ultimo = closes[closes.length - 1];
    const desempenhoSemana = ((ultimo - primeiro) / primeiro) * 100;

    document.getElementById("ganho").innerHTML =
        `<b>${desempenhoSemana.toFixed(2)}%</b> na última semana`;

    // MM20 e MM50 (no último ponto)
    const mm20 = closes.slice(-20).reduce((a,b)=>a+b,0) / Math.min(20, closes.length);
    const mm50 = closes.slice(-50).reduce((a,b)=>a+b,0) / Math.min(50, closes.length);

    const ultimoPreco = closes[closes.length - 1];

    if (ultimoPreco > mm20 && mm20 > mm50) recomendacao = "COMPRA";
    else if (ultimoPreco < mm20 && mm20 < mm50) recomendacao = "VENDA";
    else recomendacao = "MANTER";

    // Preço ideal (MM20)
    let precoIdeal = mm20.toFixed(2);
    let textoRecomendacao = "";

    if (recomendacao === "COMPRA") {
        textoRecomendacao =
            `<b>COMPRA</b> — Preço ideal: <span style="color:#2e7d32">R$ ${precoIdeal}</span>`;
    }
    else if (recomendacao === "VENDA") {
        textoRecomendacao =
            `<b>VENDA</b> — Preço ideal: <span style="color:#c62828">R$ ${precoIdeal}</span>`;
    }
    else {
        textoRecomendacao =
            `<b>MANTER</b> — Preço ideal: ---`;
    }

    document.getElementById("resultado").innerHTML = textoRecomendacao;

    // Margem de acerto (backtest simples na própria série)
    let acertos = 0;
    let erros = 0;

    for (let i = 0; i < closes.length - 1; i++) {
        const precoAtual = closes[i];
        const precoSeguinte = closes[i + 1];

        const mm20_i = closes.slice(Math.max(0, i - 19), i + 1)
                             .reduce((a,b)=>a+b,0) / Math.min(20, i+1);

        const mm50_i = closes.slice(Math.max(0, i - 49), i + 1)
                             .reduce((a,b)=>a+b,0) / Math.min(50, i+1);

        let rec = "MANTER";

        if (precoAtual > mm20_i && mm20_i > mm50_i) rec = "COMPRA";
        else if (precoAtual < mm20_i && mm20_i < mm50_i) rec = "VENDA";

        if (rec === "COMPRA") {
            if (precoSeguinte > precoAtual) acertos++;
            else erros++;
        }

        if (rec === "VENDA") {
            if (precoSeguinte < precoAtual) acertos++;
            else erros++;
        }
    }

    const total = acertos + erros;
    let taxaAcerto = total > 0 ? (acertos / total * 100).toFixed(2) : "0.00";

    document.getElementById("acuracia").innerHTML =
        `<b>${taxaAcerto}%</b> de acerto nas recomendações (histórico recente)`;

    // Tempo inteligente
    let tempoRecomendado = 30;
    if (recomendacao === "COMPRA") tempoRecomendado = 45;
    if (recomendacao === "VENDA") tempoRecomendado = 20;

    // Gráfico em linhas + tema claro
    const trace = {
        x: timestamps.map(t => new Date(t * 1000)),
        y: closes,
        type: "scatter",
        mode: "lines",
        line: {
            color: "#1976d2",
            width: 3
        }
    };

    Plotly.newPlot("chart", [trace], {
        margin: { t: 20 },
        paper_bgcolor: "#ffffff",
        plot_bgcolor: "#ffffff",
        font: { color: "#000000" },
        xaxis: { gridcolor: "#e0e0e0" },
        yaxis: { gridcolor: "#e0e0e0" }
    });

    iniciarContagem(tempoRecomendado);
}

function iniciarContagem(seg) {
    clearInterval(timer);

    let t = seg;
    const barra = document.getElementById("progressoBarra");
    const contador = document.getElementById("contador");
    const alertaSom = document.getElementById("alertaSom");

    contador.classList.remove("flash");

    timer = setInterval(() => {
        contador.innerText = `Melhor momento em ${t}s`;
        barra.style.width = (t / seg * 100) + "%";
        t--;

        if (t < 0) {
            clearInterval(timer);

            let msg = recomendacao === "COMPRA" ? "Momento ideal para COMPRA!" :
                      recomendacao === "VENDA" ? "Momento ideal para VENDA!" :
                      "Nenhuma ação recomendada.";

            contador.innerText = msg;
            contador.classList.add("flash");
            alertaSom.play();
            barra.style.width = "0%";
        }
    }, 1000);
}

function registrarTransacao() {
    alert("Transação registrada!");
}

function resetarSistema() {
    clearInterval(timer);

    document.getElementById("contador").innerText = "--";
    document.getElementById("ganho").innerText = "---";
    document.getElementById("resultado").innerText = "---";
    document.getElementById("metodo").innerText = "---";
    document.getElementById("tempoSugestao").innerText = "---";
    document.getElementById("acuracia").innerText = "---";
    document.getElementById("progressoBarra").style.width = "100%";
    alert("Sistema redefinido");
}
</script>

</body>
</html>
