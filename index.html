<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliador de Ações – IA Híbrida</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #58a6ff;
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            font-size: 16px;
            border-radius: 6px;
            border: none;
        }

        input, select {
            background: #161b22;
            color: #e6edf3;
        }

        button {
            background: #238636;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #2ea043;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .card {
            background: #161b22;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px #0004;
        }

        .card h3 {
            margin-top: 0;
            color: #58a6ff;
        }

        .highlight {
            background: #1f6feb;
            padding: 10px;
            border-radius: 8px;
            font-size: 18px;
            text-align: center;
            font-weight: bold;
        }

        .compra { background: #238636; }
        .venda { background: #da3633; }

        #grafico {
            margin-top: 25px;
            background: #161b22;
            height: 300px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8b949e;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Avaliador de Ações – IA Híbrida</h2>

    <input id="ativo" type="text" placeholder="Ex: VALE3">
    <select id="intervalo">
        <option value="1d">Diário</option>
        <option value="1h">1 hora</option>
        <option value="1wk">Semanal</option>
    </select>
    <button onclick="avaliar()">Avaliar Ativo</button>

    <div id="resultado" class="grid">
        <!-- Os cards serão preenchidos pelo app.js -->
    </div>

    <div id="grafico">Gráfico aparecerá aqui...</div>
</div>

<script src="app.js?v=90000"></script>

</body>
</html>
