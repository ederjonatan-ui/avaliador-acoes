<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avaliador de Ações – IA Híbrida</title>

<!-- Estilo TradingView -->
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0d1117;
        color: #e6edf3;
    }

    header {
        padding: 20px;
        background: #161b22;
        text-align: center;
        font-size: 22px;
        font-weight: bold;
        border-bottom: 1px solid #30363d;
    }

    .container {
        padding: 20px;
        max-width: 900px;
        margin: auto;
    }

    input, select, button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border-radius: 6px;
        border: 1px solid #30363d;
        background: #0d1117;
        color: #e6edf3;
        font-size: 16px;
    }

    button {
        background: #238636;
        cursor: pointer;
        font-weight: bold;
    }

    button:hover {
        background: #2ea043;
    }

    #resultado {
        margin-top: 20px;
        padding: 20px;
        background: #161b22;
        border-radius: 8px;
        border: 1px solid #30363d;
        white-space: pre-line;
        font-size: 16px;
    }

    canvas {
        margin-top: 30px;
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 8px;
    }

    /* Cards estilo TradingView */
    .cards {
        margin-top: 25px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        gap: 15px;
    }

    .card {
        background: #161b22;
        border: 1px solid #30363d;
        padding: 18px;
        border-radius: 10px;
        text-align: left;
    }

    .card h3 {
        margin: 0 0 10px 0;
        font-size: 18px;
    }

    .valor {
        font-size: 22px;
        font-weight: bold;
    }

    .verde { color: #2ea043; }
    .vermelho { color: #f85149; }
    .amarelo { color: #d29922; }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<header>Avaliador de Ações – IA Híbrida</header>

<div class="container">

    <input id="ticker" placeholder="Digite o ativo (ex: PETR4, VALE3, AAPL)" autocomplete="off">

    <select id="intervalo">
        <option value="1d">Diário</option>
        <option value="1h">1 hora</option>
        <option value="15m">15 minutos</option>
    </select>

    <button onclick="avaliar()">Avaliar Ativo</button>

    <div id="resultado">Resultado aparecerá aqui...</div>

    <!-- Painel de Cards -->
    <div class="cards" id="cardsPainel" style="display:none;">
        <div class="card">
            <h3>Recomendação</h3>
            <div id="cardRecomendacao" class="valor"></div>
        </div>

        <div class="card">
            <h3>Preço ideal de compra</h3>
            <div id="cardCompra" class="valor verde"></div>
        </div>

        <div class="card">
            <h3>Preço ideal de venda</h3>
            <div id="cardVenda" class="valor vermelho"></div>
        </div>

        <div class="card">
            <h3>Preço alvo</h3>
            <div id="cardAlvo" class="valor amarelo"></div>
        </div>

        <div class="card">
            <h3>Stop sugerido</h3>
            <div id="cardStop" class="valor vermelho"></div>
        </div>

        <div class="card">
            <h3>Probabilidade final</h3>
            <div id="cardProb" class="valor"></div>
        </div>

        <div class="card">
            <h3>Risco</h3>
            <div id="cardRisco" class="valor"></div>
        </div>

        <div class="card">
            <h3>Resumo técnico</h3>
            <div id="cardResumo" style="white-space:pre-line;"></div>
        </div>
    </div>

    <canvas id="grafico" height="200"></canvas>

</div>

<script>
/* ============================
   AUTOCOMPLETE GLOBAL
============================ */
document.getElementById("ticker").addEventListener("input", async function () {
    const q = this.value.trim();
    if (q.length < 2) return;

    const url = `https://query2.finance.yahoo.com/v1/finance/search?q=${q}`;
    const r = await fetch(url);
    const j = await r.json();

    if (!j.quotes) return;

    this.setAttribute("list", "lista");
    let datalist = document.getElementById("lista");
    if (!datalist) {
        datalist = document.createElement("datalist");
        datalist.id = "lista";
        document.body.appendChild(datalist);
    }

    datalist.innerHTML = j.quotes
        .slice(0, 8)
        .map(x => `<option value="${x.symbol}">${x.shortname || ""}</option>`)
        .join("");
});

/* ============================
   FUNÇÃO PRINCIPAL
============================ */
async function avaliar() {
    const ticker = document.getElementById("ticker").value.trim().toUpperCase();
    const intervalo = document.getElementById("intervalo").value;
    const resultado = document.getElementById("resultado");

    if (!ticker) {
        resultado.innerText = "Digite um ativo válido.";
        return;
    }

    resultado.innerText = "Carregando dados...";

    try {
        const dados = await obterDados(ticker, intervalo);
        const analiseLocal = analisarLocal(dados);
        const analiseExterna = await analisarExterno(analiseLocal);

        resultado.innerText =
            "📊 ANÁLISE LOCAL\n" +
            JSON.stringify(analiseLocal, null, 2) +
            "\n\n🤖 ANÁLISE IA EXTERNA\n" +
            analiseExterna;

        preencherCards(analiseLocal, analiseExterna);
        desenharGrafico(dados);

    } catch (e) {
        resultado.innerText = "Erro: " + e.message;
    }
}

/* ============================
   BUSCA DE DADOS (Yahoo Finance)
============================ */
async function obterDados(ticker, intervalo) {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=${intervalo}&range=6mo`;
    const r = await fetch(url);
    const j = await r.json();

    const c = j.chart.result[0];
    return {
        preco: c.meta.regularMarketPrice,
        timestamps: c.timestamp,
        open: c.indicators.quote[0].open,
        close: c.indicators.quote[0].close,
        high: c.indicators.quote[0].high,
        low: c.indicators.quote[0].low
    };
}

/* ============================
   ANÁLISE LOCAL (IA 1)
============================ */
function analisarLocal(d) {
    const closes = d.close.filter(x => x);

    const mm20 = closes.slice(-20).reduce((a, b) => a + b, 0) / 20;
    const mm50 = closes.slice(-50).reduce((a, b) => a + b, 0) / 50;

    // Volatilidade simples
    let volatilidade = 0;
    for (let i = closes.length - 10; i < closes.length - 1; i++) {
        volatilidade += Math.abs(closes[i] - closes[i - 1]);
    }
    volatilidade = volatilidade / 10;

    const precoIdealCompra = (mm20 - volatilidade * 0.3).toFixed(2);
    const precoIdealVenda = (mm20 + volatilidade * 0.3).toFixed(2);
    const precoAlvo = (d.preco + volatilidade * 1.2).toFixed(2);
    const stop = (d.preco - volatilidade * 0.8).toFixed(2);

    const rsi = 50 + (Math.random() * 20 - 10);
    const macd = (mm20 - mm50).toFixed(2);

    return {
        precoAtual: d.preco,
        mm20: mm20.toFixed(2),
        mm50: mm50.toFixed(2),
        volatilidade: volatilidade.toFixed(2),
        precoIdealCompra,
        precoIdealVenda,
        precoAlvo,
        stop,
        rsi: rsi.toFixed(2),
        macd,
        probLocal: Math.random().toFixed(2)
    };
}

/* ============================
   IA EXTERNA (WORKER)
============================ */
async function analisarExterno(dados) {
    const resposta = await fetch("https://purple-mountain-9031.ederjonatan.workers.dev", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            prompt: `
Você é um analista técnico profissional. Gere uma análise objetiva e direta com base nos dados abaixo:

DADOS DO ATIVO:
- Preço atual: ${dados.precoAtual}
- MM20: ${dados.mm20}
- MM50: ${dados.mm50}
- Volatilidade: ${dados.volatilidade}
- RSI: ${dados.rsi}
- MACD: ${dados.macd}
- Probabilidade local: ${dados.probLocal}

PREÇOS CALCULADOS:
- Preço ideal de COMPRA: ${dados.precoIdealCompra}
- Preço ideal de VENDA: ${dados.precoIdealVenda}
- Preço alvo (lucro máximo provável): ${dados.precoAlvo}
- Stop sugerido: ${dados.stop}

GERAR RESPOSTA EM PORTUGUÊS COM:

1) Recomendação final (COMPRA, VENDA ou MANTER)
2) Preço ideal de compra
3) Preço ideal de venda
4) Preço alvo (lucro máximo provável)
5) Stop sugerido
6) Probabilidade final de acerto (%)
7) Risco (Baixo, Médio ou Alto)
8) Justificativa técnica em no máximo 3 frases

Seja direto, profissional e objetivo.
`
        })
    });

    const json = await resposta.json();

    if (Array.isArray(json) && json[0]?.generated_text) {
        return json[0].generated_text;
    }

    return JSON.stringify(json);
}

/* ============================
   PREENCHER CARDS
============================ */
function preencherCards(dados, texto) {
    document.getElementById("cardsPainel").style.display = "grid";

    const recomendacao = texto.match(/(COMPRA|VENDA|MANTER)/i)?.[0] || "—";
    const precoCompra = texto.match(/compra[: ]+([\d.,]+)/i)?.[1] || dados.precoIdealCompra;
    const precoVenda = texto.match(/venda[: ]+([\d.,]+)/i)?.[1] || dados.precoIdealVenda;
    const precoAlvo = texto.match(/alvo[: ]+([\d.,]+)/i)?.[1] || dados.precoAlvo;
    const stop = texto.match(/stop[: ]+([\d.,]+)/i)?.[1] || dados.stop;
    const prob = texto.match(/(\d{1,3})%/)?.[1] || (dados.probLocal * 100).toFixed(0);
    const risco = texto.match(/(Baixo|Médio|Alto)/i)?.[0] || "—";

    document.getElementById("cardRecomendacao").innerText = recomendacao.toUpperCase();
    document.getElementById("cardCompra").innerText = precoCompra;
    document.getElementById("cardVenda").innerText = precoVenda;
    document.getElementById("cardAlvo").innerText = precoAlvo;
    document.getElementById("cardStop").innerText = stop;
    document.getElementById("cardProb").innerText = prob + "%";
    document.getElementById("cardRisco").innerText = risco;
    document.getElementById("cardResumo").innerText = texto;
}

/* ============================
   GRÁFICO
============================ */
let chart;

function desenharGrafico(d) {
    const ctx = document.getElementById("grafico").getContext("2d");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: d.timestamps.map(t => new Date(t * 1000).toLocaleDateString()),
            datasets: [{
                label: "Fechamento",
                data: d.close,
                borderColor: "#2ea043",
                borderWidth: 2,
                tension: 0.2
            }]
        },
        options: {
            plugins: { legend: { labels: { color: "#e6edf3" } } },
            scales: {
                x: { ticks: { color: "#e6edf3" } },
                y: { ticks: { color: "#e6edf3" } }
            }
        }
    });
}
</script>

</body>
</html>
