<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Evaluator</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .stock-list { margin: 20px 0; }
        .stock-item { cursor: pointer; padding: 10px; border: 1px solid #ccc; margin: 5px 0; }
        .filter { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Stock Evaluator</h1>
    <div class="filter">
        <button id="period-hr">Horário</button>
        <button id="period-daily">Diário</button>
        <button id="period-weekly">Semanal</button>
        <button id="period-annually">Anual</button>
    </div>
    <div class="stock-list" id="stockList">
        <div class="stock-item" data-ticker="AAPL">Apple Inc. (AAPL)</div>
        <div class="stock-item" data-ticker="MSFT">Microsoft Corp (MSFT)</div>
        <div class="stock-item" data-ticker="GOOGL">Alphabet Inc. (GOOGL)</div>
        <div class="stock-item" data-ticker="AMZN">Amazon.com Inc. (AMZN)</div>
    </div>
    <input type="text" id="tickerField" placeholder="Enter stock ticker" />

    <script>
        document.querySelectorAll('.stock-item').forEach(item => {
            item.addEventListener('click', function() {
                document.getElementById('tickerField').value = this.getAttribute('data-ticker');
            });
        });
    </script>
</body>
</html>
