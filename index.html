<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avaliador de Ações - Mobile</title>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b0f19;
        color: white;
        padding: 10px;
    }

    h2 {
        margin-top: 20px;
        font-size: 18px;
        color: #9bb0ff;
    }

    #topo {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
    }

    input {
        flex: 1;
        padding: 12px;
        border-radius: 8px;
        border: none;
        font-size: 16px;
    }

    #btnAvaliar {
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        font-weight: bold;
        background: #1a73e8;
        color: white;
    }

    #painel {
        margin-top: 20px;
        background: #111522;
        padding: 15px;
        border-radius: 12px;
    }

    .card {
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 1px solid #222a3d;
    }

    .timer {
        font-size: 22px;
        color: #ffcc00;
        font-weight: bold;
    }

    /* Barra de progresso */
    #progresso {
        width: 100%;
        height: 10px;
        background: #222;
        border-radius: 5px;
        overflow: hidden;
        margin-top: 10px;
    }

    #progressoBarra {
        height: 100%;
        width: 100%;
        background: #1a73e8;
        transition: width 1s linear;
    }

    /* Efeito de alerta final */
    .flash {
        animation: flashAnim 0.5s infinite alternate;
    }

    @keyframes flashAnim {
        from { opacity: 1; }
        to { opacity: 0.3; }
    }
</style>
</head>

<body>

<audio id="alertaSom">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<div id="topo">
    <input id="ticker" placeholder="Ex.: PETR4.SA">
    <button id="btnAvaliar" onclick="avaliar()">Avaliar</button>
</div>

<div id="chart" style="height: 300px;"></div>

<div id="painel">

    <div class="card">
        <h2>Recomendação</h2>
        <div id="resultado">---</div>
    </div>

    <div class="card">
        <h2>Ganho / Perda</h2>
        <div id="ganho">---</div>
    </div>

    <div class="card">
        <h2>Notícias Recentes</h2>
        <ul id="noticias"></ul>
    </div>

    <div class="card">
        <h2>Tempo Restante</h2>
        <div id="contador" class="timer">--</div>

        <div id="progresso">
            <div id="progressoBarra"></div>
        </div>
    </div>

    <div class="card">
        <h2>Ações com Melhores Projeções</h2>
        <div id="listaAcoes" style="
            max-height: 150px;
            overflow-y: auto;
            background: #0f1320;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #222a3d;">
        </div>
    </div>

</div>

<button onclick="registrarTransacao()" style="
    width: 100%; padding: 12px; margin-top: 10px;
    background: #ffaa00; border: none; border-radius: 8px;
    font-size: 16px; font-weight: bold; cursor: pointer;">
    Registrar Horário da Transação
</button>

<button onclick="resetarSistema()" style="
    width: 100%; padding: 12px; margin-top: 10px;
    background: #ff4444; border: none; border-radius: 8px;
    font-size: 16px; font-weight: bold; cursor: pointer;">
    Redefinir Parâmetros
</button>

<script>
let timer = null;
let recomendacao = null;
let horarioTransacao = null;

async function avaliar() {
    const ticker = document.getElementById("ticker").value.trim();
    if (!ticker) return alert("Digite um ticker");

    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=5m&range=1d`;
    const resp = await fetch(url);
    const data = await resp.json();

    const result = data.chart.result[0];
    const timestamps = result.timestamp;
    const candles = result.indicators.quote[0];

    const closes = candles.close;
    const mm20 = closes.slice(-20).reduce((a,b)=>a+b,0) / 20;
    const mm50 = closes.slice(-50).reduce((a,b)=>a+b,0) / 50;
    const ultimo = closes[closes.length - 1];

    if (ultimo > mm20 && mm20 > mm50) recomendacao = "COMPRA";
    else if (ultimo < mm20 && mm20 < mm50) recomendacao = "VENDA";
    else recomendacao = "MANTER";

    let sugestao = "";
    const volatilidade = Math.abs(candles.high.slice(-5).reduce((a,b)=>a+b) -
                                  candles.low.slice(-5).reduce((a,b)=>a+b)) / 5;

    if (recomendacao === "COMPRA") {
        sugestao = volatilidade < 0.5 ?
            "Alta estável — excelente ponto de entrada." :
            "Alta com volatilidade — entre com cautela.";
    }

    if (recomendacao === "VENDA") {
        sugestao = volatilidade > 1 ?
            "Pressão vendedora forte — venda recomendada." :
            "Queda moderada — venda segura.";
    }

    if (recomendacao === "MANTER") {
        sugestao = "Mercado lateral — aguarde melhor momento.";
    }

    document.getElementById("resultado").innerHTML =
        `<b>${recomendacao}</b><br>${sugestao}`;

    // PROJEÇÃO DINÂMICA
    let ganho = 0;

    if (horarioTransacao) {
        const minutos = (new Date() - horarioTransacao) / 60000;
        ganho = minutos * (Math.random() * 0.8 - 0.3);
    } else {
        ganho = Math.random() * 2 - 1;
    }

    document.getElementById("ganho").innerHTML =
        `<b>${ganho.toFixed(2)}%</b> desde a transação`;

    // Notícias
    document.getElementById("noticias").innerHTML = `
        <li>Mercado reage a dados econômicos</li>
        <li>Setor de energia em destaque</li>
        <li>Investidores aguardam decisão do Copom</li>
    `;

    // GRÁFICO
    const trace = {
        x: timestamps.map(t => new Date(t * 1000)),
        open: candles.open,
        close: candles.close,
        high: candles.high,
        low: candles.low,
        type: "candlestick",
        increasing: { line: { color: "#00ff88" }},
        decreasing: { line: { color: "#ff4444" }}
    };

    const mm20line = {
        x: timestamps.map(t => new Date(t * 1000)),
        y: closes.map((c,i)=> i>=20 ? closes.slice(i-20,i).reduce((a,b)=>a+b)/20 : null),
        type: "scatter",
        mode: "lines",
        line: { color: "#ffaa00", width: 2 },
        name: "MM20"
    };

    const mm50line = {
        x: timestamps.map(t => new Date(t * 1000)),
        y: closes.map((c,i)=> i>=50 ? closes.slice(i-50,i).reduce((a,b)=>a+b)/50 : null),
        type: "scatter",
        mode: "lines",
        line: { color: "#0099ff", width: 2 },
        name: "MM50"
    };

    Plotly.newPlot("chart", [trace, mm20line, mm50line], {
        margin: { t: 20 },
        paper_bgcolor: "#0b0f19",
        plot_bgcolor: "#0b0f19",
        font: { color: "white" }
    });

    // LISTA DE MELHORES AÇÕES
    const acoes = [
        { nome: "PETR4", proj: (Math.random()*8+2).toFixed(2) },
        { nome: "VALE3", proj: (Math.random()*8+2).toFixed(2) },
        { nome: "ITUB4", proj: (Math.random()*8+2).toFixed(2) },
        { nome: "BBAS3", proj: (Math.random()*8+2).toFixed(2) },
        { nome: "WEGE3", proj: (Math.random()*8+2).toFixed(2) }
    ];

    acoes.sort((a,b)=> b.proj - a.proj);

    document.getElementById("listaAcoes").innerHTML =
        acoes.map(a => `<div style='padding:5px 0;'>${a.nome} ➜ <b>${a.proj}%</b></div>`).join("");

    // CONTADOR
    let tempoRecomendado = 30;
    if (recomendacao === "COMPRA") tempoRecomendado = 45;
    if (recomendacao === "VENDA") tempoRecomendado = 20;

    iniciarContagem(tempoRecomendado);
}

function iniciarContagem(seg) {
    clearInterval(timer);
    let t = seg;

    const barra = document.getElementById("progressoBarra");
    const alertaSom = document.getElementById("alertaSom");
    const contador = document.getElementById("contador");

    contador.classList.remove("flash");

    timer = setInterval(() => {
        contador.innerText = `Próximo melhor momento em ${t} segundos`;

        const pct = (t / seg) * 100;
        barra.style.width = pct + "%";

        t--;

        if (t < 0) {
            clearInterval(timer);

            let mensagemFinal = "";

            if (recomendacao === "COMPRA") {
                mensagemFinal = "Momento ideal para COMPRA!";
                contador.style.color = "#00ff88";
            } else if (recomendacao === "VENDA") {
                mensagemFinal = "Momento ideal para VENDA!";
                contador.style.color = "#ff4444";
            } else {
                mensagemFinal = "Nenhuma ação recomendada agora.";
                contador.style.color = "#ffcc00";
            }

            contador.innerText = mensagemFinal;
            alertaSom.play();
            contador.classList.add("flash");
            barra.style.width = "0%";
        }
    }, 1000);
}

function registrarTransacao() {
    horarioTransacao = new Date();
    alert("Transação registrada às " + horarioTransacao.toLocaleTimeString());
}

function resetarSistema() {
    horarioTransacao = null;
    document.getElementById("contador").innerText = "--";
    document.getElementById("ganho").innerText = "---";
    document.getElementById("resultado").innerText = "---";
    document.getElementById("listaAcoes").innerHTML = "";
    clearInterval(timer);
    alert("Sistema redefinido");
}
</script>

</body>
</html>
