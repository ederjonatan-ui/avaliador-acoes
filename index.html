<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acompanhamento Duplo - Avaliador de Ações</title>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b0f19;
        color: white;
        padding: 10px;
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
    }

    h2 {
        margin-top: 10px;
        font-size: 16px;
        color: #9bb0ff;
    }

    .container {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }

    .quadro {
        flex: 1;
        min-width: 320px;
        max-width: 600px;
        background: #111522;
        padding: 10px;
        border-radius: 12px;
    }

    input {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: none;
        margin-bottom: 10px;
        font-size: 16px;
    }

    button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 8px;
    }

    .btnAvaliar { background: #1a73e8; color: white; }
    .btnTransacao { background: #ffaa00; }
    .btnReset { background: #ff4444; }

    .card {
        margin-top: 10px;
        padding-bottom: 10px;
        border-bottom: 1px solid #222a3d;
    }

    .timer {
        font-size: 20px;
        font-weight: bold;
        color: #ffcc00;
    }

    #listaAcoes {
        max-height: 150px;
        overflow-y: auto;
        background: #0f1320;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #222a3d;
        margin-top: 20px;
    }

    .progresso {
        width: 100%;
        height: 10px;
        background: #222;
        border-radius: 5px;
        overflow: hidden;
        margin-top: 10px;
    }

    .progressoBarra {
        height: 100%;
        width: 100%;
        background: #1a73e8;
        transition: width 1s linear;
    }

    .flash {
        animation: flashAnim 0.5s infinite alternate;
    }

    @keyframes flashAnim {
        from { opacity: 1; }
        to { opacity: 0.3; }
    }

    /* MOBILE */
    @media (max-width: 768px) {
        .container {
            flex-direction: column;
        }
    }
</style>
</head>

<body>

<audio id="alertaSom">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<h1>Acompanhamento Duplo de Ações</h1>

<div class="container">

    <!-- ===================== QUADRO 1 ===================== -->
    <div class="quadro" id="q1">
        <input id="ticker1" placeholder="Ticker 1 (ex: PETR4.SA)">
        <button class="btnAvaliar" onclick="avaliar(1)">Avaliar</button>

        <div id="chart1" style="height: 250px;"></div>

        <div class="card">
            <h2>Recomendação</h2>
            <div id="resultado1">---</div>
        </div>

        <div class="card">
            <h2>Ganho / Perda</h2>
            <div id="ganho1">---</div>
        </div>

        <div class="card">
            <h2>Tempo Restante</h2>
            <div id="contador1" class="timer">--</div>

            <div class="progresso">
                <div id="progressoBarra1" class="progressoBarra"></div>
            </div>
        </div>

        <button class="btnTransacao" onclick="registrarTransacao(1)">Registrar Transação</button>
        <button class="btnReset" onclick="resetarSistema(1)">Redefinir</button>
    </div>
