<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliador de Ações – IA Híbrida</title>

    <!-- Chart.js + Adapter + Candlestick + Zoom -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- TELA DE COFRE (SEQUÊNCIA 2207) -->
    <div id="lock-screen">
        <div class="lock-panel">
            <h2>Acesso Restrito</h2>
            <p>Digite a sequência correta</p>
            <div id="lock-display">••••</div>

            <div class="lock-grid">
                <button onclick="pressKey(2)">2</button>
                <button onclick="pressKey(1)">1</button>
                <button onclick="pressKey(0)">0</button>

                <button onclick="pressKey(3)">3</button>
                <button onclick="pressKey(7)">7</button>
                <button onclick="pressKey(4)">4</button>

                <button onclick="pressKey(9)">9</button>
                <button onclick="pressKey(8)">8</button>
                <button onclick="pressKey(5)">5</button>
            </div>

            <button id="enter-btn" class="enter-btn" onclick="unlockSite()" disabled>ENTRAR</button>
            <div id="lock-error"></div>
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="container hidden" id="main-app">

        <h1>Avaliador de Ações – IA Híbrida</h1>

        <!-- CAMPO DO ATIVO + AUTOCOMPLETE -->
        <div style="position: relative;">
            <input id="ativo" type="text" placeholder="Digite o ativo...">
            <div id="autocomplete-list" class="autocomplete-items"></div>
        </div>

        <!-- INTERVALO -->
        <select id="intervalo" onchange="avaliar()">
            <option value="1d">Diário</option>
            <option value="1h">1 hora</option>
            <option value="15m">15 minutos</option>
            <option value="1wk">Semanal</option>
            <option value="1mo">Mensal</option>
        </select>

        <button onclick="avaliar()">Avaliar Ativo</button>

        <!-- GRÁFICO PRINCIPAL -->
        <div class="card">
            <h3>Gráfico de Preço</h3>
            <canvas id="grafico" height="260"></canvas>
        </div>

        <!-- RSI -->
        <div class="card">
            <h3>
